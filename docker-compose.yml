services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env.production
    environment:
      POSTGRES_DB: ${DB_NAME:-monitor_db}
      POSTGRES_USER: ${DB_USER:-monitor_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me_db_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-monitor_user} -d ${DB_NAME:-monitor_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    env_file: .env.production
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      HOME: /tmp
      TZ: Asia/Ho_Chi_Minh
    volumes:
      - static_volume:/app/staticfiles
      - backup_volume:/app/backups
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      # python urllib thay cho curl (image slim khong co curl)
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health/', timeout=5).status==200 else 1)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  worker:
    build: .
    restart: unless-stopped
    env_file: .env.production
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      HOME: /tmp
      TZ: Asia/Ho_Chi_Minh
    command: celery -A config worker -l info --concurrency=4
    volumes:
      - backup_volume:/app/backups
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  beat:
    build: .
    restart: unless-stopped
    env_file: .env.production
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      HOME: /tmp
      TZ: Asia/Ho_Chi_Minh
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    environment:
      TZ: Asia/Ho_Chi_Minh
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - static_volume:/app/staticfiles:ro
    depends_on:
      - app

volumes:
  postgres_data:
  redis_data:
  static_volume:
  backup_volume:

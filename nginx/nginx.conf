limit_req_zone $binary_remote_addr zone=web:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

# Docker embedded DNS — tránh nginx cache IP cũ khi container app recreate
resolver 127.0.0.11 valid=10s ipv6=off;

# ── HTTP :80 → redirect to HTTPS ──────────────────────────────────────────────
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# ── HTTPS :443 ────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name _;

    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1h;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000"  always;
    add_header X-Frame-Options           "DENY"             always;
    add_header X-Content-Type-Options    "nosniff"          always;
    add_header X-XSS-Protection          "1; mode=block"    always;
    add_header Referrer-Policy           "strict-origin"    always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1024;

    # Static files served by nginx — no Django involved
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        access_log off;
    }

    # SSE realtime streams — kết nối dài, KHÔNG buffer, không rate-limit cắt ngang
    location /sse/ {
        set $django_upstream http://app:8000;
        proxy_pass         $django_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Connection         "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering    off;
        proxy_cache        off;
        chunked_transfer_encoding off;
        proxy_read_timeout 3600s;
        add_header X-Accel-Buffering no;
    }

    # API endpoints — stricter rate limit
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        set $django_upstream http://app:8000;
        proxy_pass         $django_upstream;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # All other requests → Django
    location / {
        limit_req zone=web burst=50 nodelay;
        set $django_upstream http://app:8000;
        proxy_pass         $django_upstream;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        client_max_body_size 10m;
    }
}

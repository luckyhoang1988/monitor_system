{% if active_alerts %}
<table class="table table-hover table-compact mb-0">
  <thead class="table-light">
    <tr>
      <th class="ps-2">Mức</th>
      <th>Thiết bị</th>
      <th>Rule</th>
      <th>Giá trị</th>
      <th>Thời gian</th>
    </tr>
  </thead>
  <tbody>
    {% for alert in active_alerts %}
    <tr>
      <td class="ps-2">
        <span class="badge {% if alert.severity == 'CRITICAL' %}badge-critical{% else %}badge-warning{% endif %} rounded-pill px-2">
          {{ alert.severity }}
        </span>
      </td>
      <td class="fw-medium">{{ alert.device.name }}</td>
      <td class="text-muted">{{ alert.rule.name }}</td>
      <td class="font-monospace">{{ alert.metric_value|floatformat:1 }}</td>
      <td class="text-muted small">{{ alert.triggered_at|date:"d/m H:i" }}</td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% else %}
  <div class="text-center text-muted py-2 small">
    <i class="bi bi-check-circle text-success me-1"></i>Không có alert active.
  </div>
{% endif %}

<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Đăng nhập — Monitor System</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <style>
    body { background: #1e2a3a; min-height: 100vh; display: flex; align-items: center; }
    .login-card { width: 100%; max-width: 380px; margin: 0 auto; }
    .login-brand { color: #fff; font-size: 1.4rem; font-weight: 700; text-align: center; margin-bottom: 2rem; }
    .login-brand i { font-size: 2.5rem; display: block; margin-bottom: .5rem; color: #60a5fa; }
  </style>
</head>
<body>
<div class="container">
  <div class="login-card">
    <div class="login-brand">
      <i class="bi bi-router"></i>
      Monitor System
    </div>
    <div class="card shadow-lg border-0" style="border-radius: 12px;">
      <div class="card-body p-4">
        <h5 class="card-title mb-4 text-center fw-semibold">Đăng nhập</h5>
        {% if form.errors %}
          <div class="alert alert-danger py-2">Tên đăng nhập hoặc mật khẩu không đúng.</div>
        {% endif %}
        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label small fw-semibold">Tên đăng nhập</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-person"></i></span>
              <input type="text" name="username" class="form-control" autofocus required
                     placeholder="admin">
            </div>
          </div>
          <div class="mb-4">
            <label class="form-label small fw-semibold">Mật khẩu</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input type="password" name="password" class="form-control" required>
            </div>
          </div>
          <input type="hidden" name="next" value="{{ next }}">
          <button type="submit" class="btn btn-primary w-100">
            <i class="bi bi-box-arrow-in-right me-1"></i> Đăng nhập
          </button>
        </form>
      </div>
    </div>
    <p class="text-center mt-3 text-white-50 small">Monitor System &copy; {{ "now"|date:"Y" }}</p>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

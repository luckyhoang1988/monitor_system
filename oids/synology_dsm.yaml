# Synology DSM (NAS) — SNMP qua UCD-SNMP-MIB (enterprise 1.3.6.1.4.1.2021)
# Bật SNMP trên DSM: Control Panel → Terminal & SNMP → SNMP service (v2c/v3).
# CPU: ssCpuIdle (%) → cpu_percent = 100 - idle
# Memory: memTotalReal / memAvailReal (KB) → mem% = (total - avail)/total*100
# Interface: dùng MIB-II standard (xử lý chung trong collector, không cần khai báo).

cpu:
  cpu_idle: "1.3.6.1.4.1.2021.11.11.0"     # ssCpuIdle (%)

memory:
  mem_total:  "1.3.6.1.4.1.2021.4.5.0"     # memTotalReal (KB)
  mem_avail:  "1.3.6.1.4.1.2021.4.6.0"     # memAvailReal (KB) — free, chưa trừ cache
  mem_buffer: "1.3.6.1.4.1.2021.4.14.0"    # memBuffer (KB)
  mem_cached: "1.3.6.1.4.1.2021.4.15.0"    # memCached (KB)
# mem% "thực dùng" = (total - avail - buffer - cached)/total*100 (khớp DSM Resource Monitor)

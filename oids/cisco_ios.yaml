# Cisco IOS (classic) — Catalyst 2960, 3750, 3560, 3850 (IOS mode)
# Detection: sysDescr contains "IOS" but NOT "IOS-XE"
# Enterprise OID prefix: 1.3.6.1.4.1.9

os_family: cisco_ios
snmp_versions: [v2c, v3]

cpu:
  # OLD-CISCO-CPU-MIB — % CPU trung bình
  cpu_5sec: "1.3.6.1.4.1.9.2.1.56.0"  # 5 giây (burst, ít dùng để alert)
  cpu_1min: "1.3.6.1.4.1.9.2.1.57.0"  # 1 phút
  cpu_5min: "1.3.6.1.4.1.9.2.1.58.0"  # 5 phút — DÙNG CHO ALERT

memory:
  # CISCO-MEMORY-POOL-MIB
  mem_processor_used: "1.3.6.1.4.1.9.9.48.1.1.1.5.1"  # processor pool used (bytes)
  mem_processor_free: "1.3.6.1.4.1.9.9.48.1.1.1.6.1"  # processor pool free (bytes)
  mem_io_used:        "1.3.6.1.4.1.9.9.48.1.1.1.5.2"  # I/O pool used
  mem_io_free:        "1.3.6.1.4.1.9.9.48.1.1.1.6.2"  # I/O pool free

# Cách tính mem_percent: mem_used / (mem_used + mem_free) * 100
mem_percent_formula: "mem_processor_used / (mem_processor_used + mem_processor_free) * 100"

# Temperature (nếu switch hỗ trợ)
env:
  temp_table: "1.3.6.1.4.1.9.9.13.1.3"
  temp_value: "1.3.6.1.4.1.9.9.13.1.3.1.3"  # độ C

# Access VLAN (PVID) cho từng port
vlan:
  # CISCO-VLAN-MEMBERSHIP-MIB::vmVlan — index = ifIndex, chỉ access port có entry
  vm_vlan: "1.3.6.1.4.1.9.9.68.1.2.2.1.2"
  # Fallback chuẩn Q-BRIDGE-MIB nếu vmVlan rỗng (index = dot1dBasePort)
  dot1q_pvid: "1.3.6.1.2.1.17.7.1.4.5.1.1"
  dot1d_baseport_ifindex: "1.3.6.1.2.1.17.1.4.1.2"

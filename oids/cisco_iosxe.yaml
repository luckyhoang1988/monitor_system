# Cisco IOS-XE — Catalyst 9200, 9300, 9500, 9600; ISR 4000
# Detection: sysDescr contains "IOS-XE"
# Enterprise OID prefix: 1.3.6.1.4.1.9

os_family: cisco_iosxe
snmp_versions: [v2c, v3]

cpu:
  # CISCO-PROCESS-MIB — cpmCPUTotalTable
  # .1 = CPU index (thường là 1 cho single CPU)
  cpu_5sec: "1.3.6.1.4.1.9.9.109.1.1.1.1.3.1"   # cpmCPUTotal5sec
  cpu_1min: "1.3.6.1.4.1.9.9.109.1.1.1.1.4.1"   # cpmCPUTotal1min
  cpu_5min: "1.3.6.1.4.1.9.9.109.1.1.1.1.5.1"   # cpmCPUTotal5minRev — DÙNG CHO ALERT

memory:
  # CISCO-MEMORY-POOL-MIB (giống IOS nhưng index pool khác trên một số model)
  mem_used: "1.3.6.1.4.1.9.9.48.1.1.1.5.1"  # processor pool used (bytes)
  mem_free: "1.3.6.1.4.1.9.9.48.1.1.1.6.1"  # processor pool free (bytes)

mem_percent_formula: "mem_used / (mem_used + mem_free) * 100"

# Stack members (Catalyst 9300 stack) — walk để lấy từng member
stack:
  member_table: "1.3.6.1.4.1.9.9.500.1.2.1"  # CISCO-STACKWISE-MIB

# Access VLAN (PVID) cho từng port
vlan:
  # CISCO-VLAN-MEMBERSHIP-MIB::vmVlan — index = ifIndex, chỉ access port có entry
  vm_vlan: "1.3.6.1.4.1.9.9.68.1.2.2.1.2"
  # Fallback chuẩn Q-BRIDGE-MIB nếu vmVlan rỗng (index = dot1dBasePort)
  dot1q_pvid: "1.3.6.1.2.1.17.7.1.4.5.1.1"
  dot1d_baseport_ifindex: "1.3.6.1.2.1.17.1.4.1.2"

# Cisco Business / SMB — Catalyst 1200/1300, CBS250/350
# Detection: sysDescr chứa "Catalyst 1200", "Catalyst 1300", "CBS250", "CBS350"
# Không dùng OLD-CISCO-CPU-MIB hay CISCO-PROCESS-MIB (enterprise) — trả rỗng trên C1200

os_family: cisco_business
snmp_versions: [v2c, v3]
enterprise_oid_prefix: "1.3.6.1.4.1.9.6.1.101"

cpu:
  # rlCpuUtilDuringLast* — tài liệu Cisco kmgmt3636
  cpu_5sec: "1.3.6.1.4.1.9.6.1.101.1.7.0"
  cpu_1min: "1.3.6.1.4.1.9.6.1.101.1.8.0"
  cpu_5min: "1.3.6.1.4.1.9.6.1.101.1.9.0"   # DÙNG CHO ALERT

memory:
  # C1200/C1300 không expose memory utilization qua SNMP — chỉ có sensor nhiệt độ
  mem_usage: ""

mem_percent_formula: "unavailable"

# SSH CLI (nếu protocol=ssh)
ssh_commands:
  cpu:    "show processes cpu"
  memory: "show memory statistics"
  interface: "show interfaces"
  version: "show version"

# Access VLAN (PVID) cho từng port
vlan:
  # C1200/C1300/CBS thường KHÔNG expose vmVlan (enterprise) → để rỗng, dùng dot1q chuẩn.
  vm_vlan: ""
  # Q-BRIDGE-MIB::dot1qPvid — index = dot1dBasePort
  dot1q_pvid: "1.3.6.1.2.1.17.7.1.4.5.1.1"
  dot1d_baseport_ifindex: "1.3.6.1.2.1.17.1.4.1.2"

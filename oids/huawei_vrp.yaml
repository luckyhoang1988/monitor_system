# Huawei VRP — S5700, S6700, S9300, S12700 (và các dòng tương tự)
# Detection: sysDescr contains "VRP" hoặc sysObjectID prefix 1.3.6.1.4.1.2011
# Nhất quán trên tất cả model — không cần phân biệt S5700 vs S6700

os_family: huawei_vrp
snmp_versions: [v2c, v3]
enterprise_oid_prefix: "1.3.6.1.4.1.2011"

cpu:
  # HUAWEI-ENTITY-EXTENT-MIB — hwEntityCpuUsage (cột .5)
  # .0 thường trống trên S5700/S6700 — collector sẽ walk table nếu GET fail
  # LƯU Ý: cột .6 là hwEntityCpuUsageThreshold (ngưỡng), KHÔNG phải CPU thật.
  cpu_usage: "1.3.6.1.4.1.2011.5.25.31.1.1.1.1.5.0"   # % CPU — DÙNG CHO ALERT
  cpu_table: "1.3.6.1.4.1.2011.5.25.31.1.1.1.1.5"     # walk khi scalar trống

memory:
  # HUAWEI-ENTITY-EXTENT-MIB — hwEntityMemUsage (cột .7, phần trăm trực tiếp)
  # LƯU Ý: cột .5 là CPU usage, cột .7 mới là Memory usage.
  mem_usage: "1.3.6.1.4.1.2011.5.25.31.1.1.1.1.7.0"   # % Memory — DÙNG CHO ALERT
  mem_table: "1.3.6.1.4.1.2011.5.25.31.1.1.1.1.7"     # walk khi scalar trống

# Chú ý: Huawei trả về % trực tiếp, không cần tính từ used/free
mem_percent_formula: "mem_usage"   # dùng thẳng, không cần formula

# Fan và power (optional monitoring)
env:
  fan_table:   "1.3.6.1.4.1.2011.5.25.31.1.1.7"   # hwEntityFanState
  power_table: "1.3.6.1.4.1.2011.5.25.31.1.1.9"   # hwEntityPowerState

# SSH CLI commands (dùng khi protocol=ssh thay vì snmp)
ssh_commands:
  cpu:    "display cpu-usage"
  memory: "display memory-usage"
  interface: "display interface"
  version: "display version"

# ---------------------------------------------------------------------------
# WLAN / Wireless (dùng cho device_type = wlan_controller — Huawei AC/ACL)
# HUAWEI-WLAN MIB nằm dưới enterprise 1.3.6.1.4.1.2011.6.139.
#
# ⚠️ CHƯA xác minh runtime: số cột (.x) các bảng AP/STA KHÁC NHAU theo
#    phiên bản VRP/AC (AC6605 V200R0xx vs AirEngine/YunShan). BẮT BUỘC chạy:
#        python manage.py verify_wlan_oids <device_id|ip>
#    để dò đúng cột rồi chỉnh lại các OID dưới đây trước khi tin số liệu.
#
# Collector walk từng cột (prefix đầy đủ), gom dòng theo phần index phía sau
# prefix. MAC client/AP nếu encode trong index (6 octet cuối) sẽ được tự suy ra
# khi cột mac không trả giá trị.
# ---------------------------------------------------------------------------
wlan:
  enterprise_parent: "1.3.6.1.4.1.2011.6.139"

  # Trạng thái AP coi là online (hwWlanApRunState). 8 = normal trên nhiều bản;
  # verify_wlan_oids sẽ in giá trị thực để đối chiếu.
  ap_run_state_online: [8]

  # Bảng AP — hwWlanApInfoTable (1.3.6.1.4.1.2011.6.139.13.3.3.1.*)
  # Đã kiểm chứng AC6508 V200R022C00SPC100 (2026-06): cột .6 là run_state=8.
  # Cột .2 trả serial AP, MAC thật lấy từ 6 octet index nên vẫn để để tham khảo.
  ap:
    name:      "1.3.6.1.4.1.2011.6.139.13.3.3.1.4"
    mac:       "1.3.6.1.4.1.2011.6.139.13.3.3.1.2"
    ip:        ""  # AC6508 trả IPv6 all-zero ở .30; chưa có IPv4 AP đáng tin qua table này.
    group:     "1.3.6.1.4.1.2011.6.139.13.3.3.1.5"
    run_state: "1.3.6.1.4.1.2011.6.139.13.3.3.1.6"
    sta_count: ""  # Chưa xác minh đúng cột client/AP; tránh hiển thị số giả.

  # Bảng client/station — hwWlanStaInfoTable (1.3.6.1.4.1.2011.6.139.13.3.5.1.*)
  # AC6508 V200R022 hiện trả các cột dưới dạng counter/index khó giải nghĩa;
  # để trống cho tới khi đối chiếu được MIB/CLI thật.
  station:
    ap_name:     ""
    ssid:        ""
    ip:          ""
    radio_type:  ""
    rssi:        ""
    online_time: ""
